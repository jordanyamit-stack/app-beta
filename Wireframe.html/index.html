<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Amazon - Inicio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo">amazon.es</a>
        <div class="search-bar">
            <input type="text" placeholder="Buscar productos">
            <button>🔍</button>
        </div>
    </header>

    <main class="main-container">
        <article class="product-card">
            <div class="product-image">Imagen de Electrónica</div>
            <h3>Ofertas Relámpago</h3>
            <button class="btn-amazon" style="background-color: #ffd814;">Ver ofertas</button>
        </article>

        <article class="product-card">
            <div class="product-image">Imagen de Hogar</div>
            <h3>Lo más vendido</h3>
            <button class="btn-amazon" style="background-color: #ffd814;">Comprar ahora</button>
        </article>
    </main>

</body>
</html>
