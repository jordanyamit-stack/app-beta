<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Amazon</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-container">
        <div class="login-box">
            <!-- Aquí reemplazas 'perfil.jpg' por el nombre de tu imagen -->
            <div class="profile-img-container">
                <img src="perfil.png" alt="Foto de perfil" class="profile-img-file">
            </div>
            <form>
                <div class="field">
                    <label>Correo electrónico o número de celular</label>
                    <input type="text">
                </div>
                <div class="field">
                    <label>Contraseña</label>
                    <input type="password">
                </div>
                <a href="index.html" class="btn-amazon">Continuar</a>
            </form>

            <div class="links">
                <a href="#">¿Olvidaste tu contraseña?</a><br><br>
                <p>¿Eres nuevo en Amazon?</p>
                <a href="#">Crear tu cuenta de Amazon</a>
            </div>
        </div>
    </div>

</body>
</html>
